# Redis 프로덕션 설정 파일
# 보안 강화 및 성능 최적화 설정

# 네트워크 설정
bind 0.0.0.0  # 모든 인터페이스에서 연결 허용 (Docker 네트워크용)
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# 일반 설정
daemonize no  # Docker에서는 포그라운드 실행
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# 스냅샷 설정 (데이터 영속성)
save 900 1    # 900초 동안 1개 이상 키 변경 시 저장
save 300 10   # 300초 동안 10개 이상 키 변경 시 저장
save 60 10000 # 60초 동안 10000개 이상 키 변경 시 저장

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 복제 설정
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600

# 보안 설정
# requirepass는 docker-compose에서 설정됨
rename-command FLUSHDB ""     # 위험한 명령어 비활성화
rename-command FLUSHALL ""    # 위험한 명령어 비활성화
rename-command DEBUG ""       # 디버그 명령어 비활성화
rename-command CONFIG "CONFIG_b835c3f8a5d9e7f2"  # CONFIG 명령어 이름 변경

# 메모리 관리
maxmemory-policy allkeys-lru  # LRU 정책으로 메모리 관리
maxmemory-samples 5

# AOF (Append Only File) 설정
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Lua 스크립팅
lua-time-limit 5000

# 슬로우 로그 설정
slowlog-log-slower-than 10000  # 10ms 이상 걸리는 명령어 로깅
slowlog-max-len 128

# 지연 시간 모니터링
latency-monitor-threshold 100

# 이벤트 알림
notify-keyspace-events ""

# 고급 설정
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# 활성 재해싱
activerehashing yes

# 클라이언트 출력 버퍼 제한
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 클라이언트 쿼리 버퍼 제한
client-query-buffer-limit 1gb

# 프로토콜 최대 크기
proto-max-bulk-len 512mb

# 주파수 기반 LRU/LFU
hz 10

# 동적 HZ
dynamic-hz yes

# AOF 재작성 증분 fsync
aof-rewrite-incremental-fsync yes

# RDB 저장 증분 fsync
rdb-save-incremental-fsync yes