# Fluentd 설정 파일 - Solebid 프로덕션 로그 수집

# 입력 소스 설정
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Docker 컨테이너 로그 수집
<source>
  @type tail
  @id input_tail_docker
  path /var/lib/docker/containers/*/*-json.log
  pos_file /var/log/fluentd-docker.log.pos
  tag docker.*
  format json
  time_key time
  time_format %Y-%m-%dT%H:%M:%S.%NZ
</source>

# 백엔드 애플리케이션 로그 필터링
<filter docker.**>
  @type grep
  <regexp>
    key container_name
    pattern ^solebid-(backend|frontend|redis)-prod$
  </regexp>
</filter>

# 로그 파싱 및 구조화
<filter docker.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

# 백엔드 로그 레벨별 분류
<match docker.var.lib.docker.containers.*.solebid-backend-prod*>
  @type rewrite_tag_filter
  <rule>
    key log
    pattern /ERROR/
    tag backend.error
  </rule>
  <rule>
    key log
    pattern /WARN/
    tag backend.warn
  </rule>
  <rule>
    key log
    pattern /INFO/
    tag backend.info
  </rule>
  <rule>
    key log
    pattern /.*/
    tag backend.debug
  </rule>
</match>

# 프론트엔드 Nginx 로그 처리
<match docker.var.lib.docker.containers.*.solebid-frontend-prod*>
  @type rewrite_tag_filter
  <rule>
    key log
    pattern /error/
    tag frontend.error
  </rule>
  <rule>
    key log
    pattern /access/
    tag frontend.access
  </rule>
  <rule>
    key log
    pattern /.*/
    tag frontend.info
  </rule>
</match>

# Redis 로그 처리
<match docker.var.lib.docker.containers.*.solebid-redis-prod*>
  @type rewrite_tag_filter
  <rule>
    key log
    pattern /.*/
    tag redis.info
  </rule>
</match>

# 에러 로그 별도 저장
<match *.error>
  @type file
  path /var/log/solebid/error
  append true
  time_slice_format %Y%m%d
  time_slice_wait 10m
  time_format %Y%m%dT%H%M%S%z
  compress gzip
  <format>
    @type json
  </format>
  <buffer>
    @type file
    path /var/log/solebid/error.buffer
    flush_mode interval
    flush_interval 30s
    chunk_limit_size 10m
    queue_limit_length 128
  </buffer>
</match>

# 일반 로그 저장
<match **>
  @type file
  path /var/log/solebid/application
  append true
  time_slice_format %Y%m%d
  time_slice_wait 10m
  time_format %Y%m%dT%H%M%S%z
  compress gzip
  <format>
    @type json
  </format>
  <buffer>
    @type file
    path /var/log/solebid/application.buffer
    flush_mode interval
    flush_interval 60s
    chunk_limit_size 50m
    queue_limit_length 256
  </buffer>
</match>

# 시스템 메트릭 수집 (선택사항)
<source>
  @type monitor_agent
  bind 0.0.0.0
  port 24220
</source>

